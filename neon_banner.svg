<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0221"/>
      <stop offset="100%" stop-color="#1a0533"/>
    </linearGradient>

    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur1"/>
      <feGaussianBlur stdDeviation="14" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowPink" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="10" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="220" fill="url(#bg)"/>

  <!-- perspective grid floor -->
  <g stroke="#ff00c1" stroke-width="1" opacity="0.25">
    <line x1="0" y1="220" x2="330" y2="120"/>
    <line x1="90" y1="220" x2="360" y2="120"/>
    <line x1="180" y1="220" x2="390" y2="120"/>
    <line x1="270" y1="220" x2="420" y2="120"/>
    <line x1="450" y1="220" x2="450" y2="120"/>
    <line x1="630" y1="220" x2="480" y2="120"/>
    <line x1="720" y1="220" x2="510" y2="120"/>
    <line x1="810" y1="220" x2="540" y2="120"/>
    <line x1="900" y1="220" x2="570" y2="120"/>
    <line x1="0" y1="190" x2="900" y2="190"/>
    <line x1="60" y1="165" x2="840" y2="165"/>
    <line x1="140" y1="145" x2="760" y2="145"/>
    <line x1="220" y1="128" x2="680" y2="128"/>
  </g>

  <!-- flickering cyan main title -->
  <text x="450" y="105" text-anchor="middle" font-family="'Courier New', monospace" font-weight="bold"
        font-size="54" fill="#00fff9" filter="url(#glowCyan)">
    Zainab
    <animate attributeName="opacity"
      values="1;1;0.35;1;1;0.5;1;1;1;0.3;1;1"
      dur="2.6s" repeatCount="indefinite"/>
  </text>

  <!-- flickering magenta subtitle -->
  <text x="450" y="150" text-anchor="middle" font-family="'Courier New', monospace" font-weight="bold"
        font-size="24" letter-spacing="4" fill="#ff00c1" filter="url(#glowPink)">
    DATA // ML // AI
    <animate attributeName="opacity"
      values="1;1;1;0.4;1;1;0.6;1;1;1;0.2;1"
      dur="1.9s" begin="0.4s" repeatCount="indefinite"/>
  </text>

  <!-- purple blinking terminal cursor / status -->
  <text x="450" y="185" text-anchor="middle" font-family="'Courier New', monospace"
        font-size="16" fill="#bc13fe">
    [ SYSTEM ONLINE ]<tspan fill="#00fff9">_</tspan>
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </text>

  <!-- corner brackets, cyberpunk HUD accent -->
  <g stroke="#00fff9" stroke-width="2" fill="none" opacity="0.8">
    <path d="M20,20 L20,45 M20,20 L45,20"/>
    <path d="M880,20 L880,45 M880,20 L855,20"/>
    <path d="M20,200 L20,175 M20,200 L45,200"/>
    <path d="M880,200 L880,175 M880,200 L855,200"/>
  </g>
</svg>
