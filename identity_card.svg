<svg width="700" height="230" viewBox="0 0 700 230" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b1"/>
      <feMerge>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="700" height="230" fill="#000000"/>
  <rect x="4" y="4" width="692" height="222" fill="none" stroke="#00fff9" stroke-width="1.5" filter="url(#glow)"/>

  <g font-family="'Courier New', monospace" font-size="15">
    <text x="24" y="34" fill="#ff00c1" font-weight="bold" filter="url(#glow)">SYSTEM :: IDENTITY_MODULE</text>
    <line x1="24" y1="46" x2="676" y2="46" stroke="#00fff9" stroke-width="1" opacity="0.5"/>

    <text x="24" y="76" fill="#00fff9">designation   : <tspan fill="#f9f871" font-weight="bold">zainab2309</tspan></text>
    <text x="24" y="102" fill="#00fff9">class         : <tspan fill="#39ff88" font-weight="bold">Data / ML / AI Engineer</tspan></text>
    <text x="24" y="128" fill="#00fff9">location      : <tspan fill="#00fff9" font-weight="bold">sector-unknown</tspan></text>
    <text x="24" y="154" fill="#00fff9">status        :
      <tspan fill="#ff00c1" font-weight="bold">
        [ONLINE]
        <animate attributeName="opacity" values="1;0.3;1" dur="1.4s" repeatCount="indefinite"/>
      </tspan>
      <tspan fill="#00fff9"> gears turning, GPUs humming</tspan>
    </text>
    <text x="24" y="180" fill="#00fff9">motto         : <tspan fill="#f9f871" font-style="italic">"old brass, new neurons."</tspan></text>
  </g>
</svg>
